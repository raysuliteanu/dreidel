[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
Generated by [git-cliff](https://github.com/orhun/git-cliff).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}\
          {{ commit.message | upper_first }} \
          ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/raysuliteanu/dreidel/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    # Strip issue/PR refs from end of message (e.g. "(#42)")
    { pattern = '\s*\(#\d+\)$', replace = "" },
]
commit_parsers = [
    { message = "^feat",     group = "Features" },
    { message = "^fix",      group = "Bug Fixes" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs?",    group = "Documentation" },
    { message = "^test",     group = "Testing" },
    { message = "^build",    group = "Build System" },
    { message = "^ci",       group = "CI" },
    { message = "^chore",    group = "Miscellaneous", default_scope = "other" },
    { body = ".*security",   group = "Security" },
    # Skip empty or merge commits
    { message = "^Merge",    skip = true },
    { message = "^$",        skip = true },
]
protect_breaking_commits = false
filter_commits = true
exclude_commits = "^Merge|^$"
tag_pattern = "v[0-9].*"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
