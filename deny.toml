# cargo-deny configuration
# Run: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

[licenses]
version = 2
# This crate is GPL-3.0-only. All dependencies must be under compatible licenses.
# Permissive licenses (MIT, Apache-2.0, BSD-*) are compatible with GPL-3.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "GPL-3.0-only",
    "LGPL-2.1-only",
    "LGPL-3.0-only",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate in the dependency tree.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
skip = []
skip-tree = []

[advisories]
version = 2
# Deny crates with known security advisories.
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
